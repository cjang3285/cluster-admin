---
- name: System Update and Sequential Reboot
  hosts: all
  gather_facts: yes
  serial: 1
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      become: yes

    - name: Upgrade packages
      apt:
        upgrade: dist
      become: yes

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      reboot:
        msg: "System reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      become: yes
      when: reboot_required.stat.exists

    - name: Wait for k3s service to be ready (master)
      systemd:
        name: k3s
        state: started
      become: yes
      register: k3s_service
      until: k3s_service.status.ActiveState == 'active'
      retries: 60
      delay: 10
      when: inventory_hostname in groups['master']

    - name: Wait for k3s-agent service to be ready (workers)
      systemd:
        name: k3s-agent
        state: started
      become: yes
      register: k3s_agent_service
      until: k3s_agent_service.status.ActiveState == 'active'
      retries: 60
      delay: 10
      when: inventory_hostname in groups['workers']
